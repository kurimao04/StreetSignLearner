<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR - 10 Image Targets</title>
    <!-- A-Frame FrameWork -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      /* Simple overlay UI to show the user what's happening */
      #ui-overlay {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <!-- UI feedback text -->
    <div id="ui-overlay">Point your camera at one of your 10 targets</div>

    <!-- 
      maxTrack: 1 is recommended for performance with 10 targets unless 
      you explicitly need to scan multiple images sitting side-by-side.
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <!-- JavaScript will dynamically inject the 10 target entities here -->
      <div id="target-container"></div>

    </a-scene>

    <script>
      const container = document.querySelector('#target-container');
const uiOverlay = document.querySelector('#ui-overlay');
const totalTargets = 10;

// 1. Path to your 10 images (update these with your actual file names/URLs)
const imageOverlays = [
  "images/overlay1.png", "images/overlay2.png", "images/overlay3.png",
  "images/overlay4.png", "images/overlay5.png", "images/overlay6.png",
  "images/overlay7.png", "images/overlay8.png", "images/overlay9.png",
  "images/overlay10.png"
];

const colors = [
  "#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", 
  "#ec4899", "#06b6d4", "#f97316", "#14b8a6", "#6366f1"
];

// Loop to generate each target programmatically
for (let i = 0; i < totalTargets; i++) {
  // Create the parent anchor entity
  const targetEntity = document.createElement('a-entity');
  targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
  
  // Create a semi-transparent border plane (Optional: keep or remove)
  const borderPlane = document.createElement('a-plane');
  borderPlane.setAttribute('color', colors[i]);
  borderPlane.setAttribute('opacity', '0.3');
  borderPlane.setAttribute('position', '0 0 0');
  borderPlane.setAttribute('height', '1');
  borderPlane.setAttribute('width', '1');
  
  // 2. NEW: Create the Image Overlay
  const imgOverlay = document.createElement('a-image');
  imgOverlay.setAttribute('src', imageOverlays[i]);
  // Set position slightly forward (z = 0.01) to prevent flickering/Z-fighting with the border plane
  imgOverlay.setAttribute('position', '0 0 0.01'); 
  imgOverlay.setAttribute('width', '1');
  imgOverlay.setAttribute('height', '1');
  
  // Optional: If you want your images to fade in, rotate, or animate, you can still add it:
  // imgOverlay.setAttribute('animation', 'property: rotation; to: 0 0 360; dur: 8000; loop: true; easing: linear');

  // Track when targets are found/lost
  targetEntity.addEventListener("targetFound", () => {
    console.log(`Target ${i} Detected`);
    uiOverlay.innerText = `Scanning: Target #${i + 1}`;
    uiOverlay.style.background = "rgba(16, 185, 129, 0.85)";
  });

  targetEntity.addEventListener("targetLost", () => {
    console.log(`Target ${i} Lost`);
    uiOverlay.innerText = "Point your camera at one of your 10 targets";
    uiOverlay.style.background = "rgba(0, 0, 0, 0.7)";
  });

  // Assemble the hierarchy
  targetEntity.appendChild(borderPlane);
  targetEntity.appendChild(imgOverlay); // Appending the image instead of the box
  container.appendChild(targetEntity);
}
    </script>
  </body>
</html>
