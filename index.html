<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR - Premium UI/UX</title>
    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
      }

      /* =========================================
         ONBOARDING SCREEN (Wireframe Minimalist)
         ========================================= */
      #onboarding-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fafafa;
        /* Wireframe grid background */
        background-image: 
          linear-gradient(#d1d5db 1px, transparent 1px), 
          linear-gradient(90deg, #d1d5db 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #onboarding-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .onboarding-card {
        background: white;
        border: 2px solid #111;
        padding: 40px 30px;
        box-shadow: 8px 8px 0px #111; /* Brutalist/Minimalist shadow */
        max-width: 350px;
      }

      .onboarding-card h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
        color: #111;
      }

      .onboarding-card p {
        margin: 0 0 30px 0;
        font-size: 14px;
        color: #555;
      }

      .start-btn {
        background: transparent;
        border: 2px solid #111;
        color: #111;
        padding: 12px 24px;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .start-btn:hover {
        background: #111;
        color: white;
      }

      /* =========================================
         DISTANCE WARNING UI
         ========================================= */
      #distance-warning {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(245, 158, 11, 0.9); /* Amber warning */
        color: white;
        padding: 8px 20px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 600;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }

      #distance-warning.visible {
        opacity: 1;
      }

      /* =========================================
         EXISTING AR UI ELEMENTS
         ========================================= */
      #scanning-guide {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 250px;
        height: 250px;
        z-index: 998;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      
      .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: rgba(255, 255, 255, 0.8);
        border-style: solid;
        animation: pulse 2s infinite;
      }
      
      .top-left { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 12px; }
      .top-right { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 12px; }
      .bottom-left { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 12px; }
      .bottom-right { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 12px; }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 0.4; }
        100% { transform: scale(1); opacity: 0.8; }
      }

      #ui-overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        width: 85%;
        max-width: 380px;
        background: rgba(20, 20, 25, 0.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        color: white;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      #ui-overlay.found-state {
        background: rgba(16, 185, 129, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.4);
        transform: translateX(-50%) scale(1.02);
      }

      #ui-overlay h3 { margin: 0 0 8px 0; font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
      #ui-overlay p { margin: 0; font-size: 14px; color: rgba(255, 255, 255, 0.9); line-height: 1.5; font-weight: 400; }
      .icon { font-size: 24px; margin-bottom: 5px; display: block; }
    </style>
  </head>
  <body>
    
    <!-- Wireframe Onboarding Screen -->
    <div id="onboarding-screen">
      <div class="onboarding-card">
        <h1>AR Sign Scanner</h1>
        <p>Point your camera at supported street signs to reveal safety information and rules in Augmented Reality.</p>
        <button class="start-btn" id="start-btn">Start Experience</button>
      </div>
    </div>

    <!-- Distance Warning -->
    <div id="distance-warning">⚠️ Move closer to the sign</div>

    <!-- Visual Reticle to help users aim -->
    <div id="scanning-guide">
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>
    </div>

    <!-- Enhanced UI Overlay -->
    <div id="ui-overlay">
      <span class="icon">📷</span>
      <h3>Scanner Ready</h3>
      <p>Align a sign within the frame to scan.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="tex-yosi" src="images/yosi.png">
        <img id="tex-parking" src="images/parking.png">
        <img id="tex-noturn" src="images/noturn.png">
        <img id="tex-twoway" src="images/twoway.png">
        <img id="tex-narrowroad" src="images/narrowroad.png">
        <img id="tex-slippery" src="images/slippery.png">
        <img id="tex-pedestrian" src="images/predestrian.png">
        <img id="tex-windingroad" src="images/windingroad.png">
        <img id="tex-slipperyroad" src="images/slipperyroad.png">
        <img id="tex-drowning" src="images/drowning.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
      // UI Elements
      const container = document.querySelector('#target-container');
      const uiOverlay = document.querySelector('#ui-overlay');
      const scanGuide = document.querySelector('#scanning-guide');
      const onboardingScreen = document.querySelector('#onboarding-screen');
      const startBtn = document.querySelector('#start-btn');
      const distanceWarning = document.querySelector('#distance-warning');
      
      const totalTargets = 10;
      let activeTarget3D = null; // Used to track the currently visible target for distance checking

      // Dismiss onboarding screen
      startBtn.addEventListener('click', () => {
        onboardingScreen.classList.add('hidden');
      });

      const imageOverlays = [
        "#tex-yosi", "#tex-parking", "#tex-noturn", "#tex-twoway", "#tex-narrowroad",
        "#tex-slippery", "#tex-pedestrian", "#tex-windingroad", "#tex-slipperyroad", "#tex-drowning"
      ];

      const signData = [
        { icon: "🚭", title: "No Smoking", desc: "Smoking or using e-cigarettes is strictly prohibited in this area." },
        { icon: "🅿️", title: "Parking Area", desc: "Designated location where vehicles can be safely parked." },
        { icon: "🚫", title: "No Turning", desc: "Vehicles are not permitted to make a turn at this intersection." },
        { icon: "↕️", title: "Two-Way Traffic", desc: "Warning: You are entering a road with opposing traffic." },
        { icon: "⚠️", title: "Narrow Road Ahead", desc: "The road ahead narrows. Proceed with caution and yield if necessary." },
        { icon: "🥾", title: "Slippery Surface", desc: "Watch your step! The surface here can be slippery." },
        { icon: "🚶", title: "Pedestrian Crossing", desc: "Slow down and yield to pedestrians crossing the street." },
        { icon: "🔄", title: "Winding Road", desc: "The road ahead curves continuously. Drive carefully." },
        { icon: "🌧️", title: "Slippery When Wet", desc: "Vehicles may lose traction here during rain. Reduce speed." },
        { icon: "🛟", title: "Deep Water Hazard", desc: "Warning: Deep water area. Swimming is dangerous or prohibited." }
      ];

      for (let i = 0; i < totalTargets; i++) {
        const targetEntity = document.createElement('a-entity');
        targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        const signContainer = document.createElement('a-entity');
        signContainer.setAttribute('rotation', '90 0 0');
        signContainer.setAttribute('scale', '1 1 1');
        
        // Perfectly smooth 360 rotation
        signContainer.setAttribute('animation', 'property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 10000; easing: linear;');

        const metalRim = document.createElement('a-cylinder');
        metalRim.setAttribute('radius', '0.51');       
        metalRim.setAttribute('height', '0.06');       
        metalRim.setAttribute('open-ended', 'true');   
        metalRim.setAttribute('side', 'double');
        metalRim.setAttribute('color', '#4a4a4a');     
        metalRim.setAttribute('metalness', '0.8');     
        metalRim.setAttribute('roughness', '0.4');

        const backPlate = document.createElement('a-circle');
        backPlate.setAttribute('radius', '0.5');
        backPlate.setAttribute('position', '0 -0.029 0'); 
        backPlate.setAttribute('rotation', '90 0 180');     
        backPlate.setAttribute('material', `src: ${imageOverlays[i]}; roughness: 0.6; metalness: 0.1;`);

        const signFace = document.createElement('a-circle');
        signFace.setAttribute('radius', '0.5');
        signFace.setAttribute('position', '0 0.03 0');    
        signFace.setAttribute('rotation', '-90 0 0');    
        signFace.setAttribute('material', `src: ${imageOverlays[i]}; roughness: 0.6; metalness: 0.1;`);

        signContainer.appendChild(metalRim);
        signContainer.appendChild(backPlate);
        signContainer.appendChild(signFace);

        // When target is detected
        targetEntity.addEventListener("targetFound", () => {
          activeTarget3D = targetEntity.object3D; // Start tracking this target for distance
          
          uiOverlay.innerHTML = `<span class="icon">${signData[i].icon}</span><h3>${signData[i].title}</h3><p>${signData[i].desc}</p>`;
          uiOverlay.classList.add("found-state");
          scanGuide.style.opacity = "0";
        });

        // When target is lost
        targetEntity.addEventListener("targetLost", () => {
          activeTarget3D = null; // Stop tracking
          distanceWarning.classList.remove('visible'); // Hide warning immediately
          
          uiOverlay.innerHTML = `<span class="icon">📷</span><h3>Scanner Ready</h3><p>Align a sign within the frame to scan.</p>`;
          uiOverlay.classList.remove("found-state");
          scanGuide.style.opacity = "1";
        });

        targetEntity.appendChild(signContainer);
        container.appendChild(targetEntity);
      }

      // =========================================
      // DISTANCE CHECKING LOOP
      // =========================================
      // This function continuously runs. If an image is being tracked, it calculates the distance 
      // from the camera (which defaults to 0,0,0 in MindAR) to the target's position.
      function trackDistance() {
        if (activeTarget3D) {
          // Calculate the straight-line distance from origin to the target
          const distance = activeTarget3D.position.length();
          
          // The threshold value (e.g., 3.5) depends heavily on the physical size 
          // of the real-world marker. Adjust this number up or down to fine-tune UX!
          const distanceThreshold = 3.5; 

          if (distance > distanceThreshold) {
            distanceWarning.classList.add('visible');
          } else {
            distanceWarning.classList.remove('visible');
          }
        }
        // Call next frame
        requestAnimationFrame(trackDistance);
      }
      
      // Kick off the tracking loop
      trackDistance();

    </script>
  </body>
</html>
