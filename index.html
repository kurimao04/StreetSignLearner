<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- 
      Set imageTargetSrc to the path of your .mind file.
      vr-mode-ui and device-orientation-permission-ui are disabled for a cleaner AR experience.
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <!-- targetIndex: 0 refers to the first image in your targets.mind file -->
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- Sample Overlay 1: A semi-transparent plane to highlight the detected image -->
        <a-plane 
          color="#3b82f6" 
          opacity="0.5" 
          position="0 0 0" 
          height="1" 
          width="1" 
          rotation="0 0 0">
        </a-plane>

        <!-- Sample Overlay 2: A floating, spinning 3D box -->
        <a-box 
          color="#ef4444" 
          depth="0.2" 
          height="0.2" 
          width="0.2" 
          position="0 0 0.2" 
          animation="property: rotation; to: 0 360 0; dur: 2000; easing: linear; loop: true">
        </a-box>
        
      </a-entity>
    </a-scene>
  </body>
</html>
