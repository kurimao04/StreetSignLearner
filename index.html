<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR - 10 Image Targets</title>
    <!-- A-Frame FrameWork -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #ui-overlay {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 12px;
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        width: 80%;
        max-width: 400px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        transition: background 0.3s ease;
      }
      #ui-overlay h3 {
        margin: 0 0 5px 0;
        font-size: 18px;
        color: #fff;
      }
      #ui-overlay p {
        margin: 0;
        font-size: 14px;
        color: #ddd;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <h3>Scanner Ready</h3>
      <p>Point your camera at one of your 10 signs.</p>
    </div>

    <!-- 
      PRO TIP: If the sign itself is "shaking" while tracking, you can add 
      filterMinCF: 0.0001; filterBeta: 0.001; inside mindar-image="" below 
      to smooth out the camera tracking jitter.
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="tex-yosi" src="images/yosi.png">
        <img id="tex-parking" src="images/parking.png">
        <img id="tex-noturn" src="images/noturn.png">
        <img id="tex-twoway" src="images/twoway.png">
        <img id="tex-narrowroad" src="images/narrowroad.png">
        <img id="tex-slippery" src="images/slippery.png">
        <img id="tex-pedestrian" src="images/pedestrian.png">
        <img id="tex-windingroad" src="images/windingroad.png">
        <img id="tex-slipperyroad" src="images/slipperyroad.png">
        <img id="tex-drowning" src="images/drowning.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
      const container = document.querySelector('#target-container');
      const uiOverlay = document.querySelector('#ui-overlay');
      const totalTargets = 10;

      const imageOverlays = [
        "#tex-yosi", "#tex-parking", "#tex-noturn", "#tex-twoway", "#tex-narrowroad",
        "#tex-slippery", "#tex-pedestrian", "#tex-windingroad", "#tex-slipperyroad", "#tex-drowning"
      ];

      const signData = [
        { title: "No Smoking", desc: "Smoking or using e-cigarettes is strictly prohibited in this area." },
        { title: "Parking Area", desc: "Designated location where vehicles can be safely parked." },
        { title: "No Turning", desc: "Vehicles are not permitted to make a turn at this intersection." },
        { title: "Two-Way Traffic", desc: "Warning: You are entering a road with opposing traffic." },
        { title: "Narrow Road Ahead", desc: "The road ahead narrows. Proceed with caution and yield if necessary." },
        { title: "Slippery Surface", desc: "Watch your step! The surface here can be slippery." },
        { title: "Pedestrian Crossing", desc: "Slow down and yield to pedestrians crossing the street." },
        { title: "Winding Road", desc: "The road ahead curves continuously. Drive carefully." },
        { title: "Slippery When Wet", desc: "Vehicles may lose traction here during rain. Reduce speed." },
        { title: "Deep Water Hazard", desc: "Warning: Deep water area. Swimming is dangerous or prohibited." }
      ];

      for (let i = 0; i < totalTargets; i++) {
        const targetEntity = document.createElement('a-entity');
        targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        const signContainer = document.createElement('a-entity');
        signContainer.setAttribute('rotation', '90 0 0');
        signContainer.setAttribute('scale', '1 1 1');
        
        // FIX: Added 'from: 90 0 0;' and increased 'dur: 10000;' for a perfectly smooth, seamless rotation.
        signContainer.setAttribute('animation', 'property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 10000; easing: linear;');

        const metalRim = document.createElement('a-cylinder');
        metalRim.setAttribute('radius', '0.51');       
        metalRim.setAttribute('height', '0.06');       
        metalRim.setAttribute('open-ended', 'true');   
        metalRim.setAttribute('side', 'double');
        metalRim.setAttribute('color', '#4a4a4a');     
        metalRim.setAttribute('metalness', '0.8');     
        metalRim.setAttribute('roughness', '0.4');

        const backPlate = document.createElement('a-circle');
        backPlate.setAttribute('radius', '0.5');
        backPlate.setAttribute('position', '0 -0.029 0'); 
        backPlate.setAttribute('rotation', '90 0 180');     
        backPlate.setAttribute('material', `src: ${imageOverlays[i]}; roughness: 0.6; metalness: 0.1;`);

        const signFace = document.createElement('a-circle');
        signFace.setAttribute('radius', '0.5');
        signFace.setAttribute('position', '0 0.03 0');    
        signFace.setAttribute('rotation', '-90 0 0');    
        signFace.setAttribute('material', `src: ${imageOverlays[i]}; roughness: 0.6; metalness: 0.1;`);

        signContainer.appendChild(metalRim);
        signContainer.appendChild(backPlate);
        signContainer.appendChild(signFace);

        targetEntity.addEventListener("targetFound", () => {
          uiOverlay.innerHTML = `<h3>${signData[i].title}</h3><p>${signData[i].desc}</p>`;
          uiOverlay.style.background = "rgba(16, 185, 129, 0.9)"; 
        });

        targetEntity.addEventListener("targetLost", () => {
          uiOverlay.innerHTML = `<h3>Scanner Ready</h3><p>Point your camera at one of your 10 signs.</p>`;
          uiOverlay.style.background = "rgba(0, 0, 0, 0.8)";
        });

        targetEntity.appendChild(signContainer);
        container.appendChild(targetEntity);
      }
    </script>
  </body>
</html>
