<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AR Sign Scanner</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">

    <link rel="apple-touch-icon" href="images/apple-icon-180.png">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AR Scanner">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      /* =========================================
         BASE APP STYLES
         ========================================= */
      * { box-sizing: border-box; }
      body {
        margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #000;
        overscroll-behavior-y: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
      }

      /* =========================================
         TOP NAVIGATION BAR (Logs & Translation)
         ========================================= */
      #top-nav {
        position: absolute;
        top: max(20px, env(safe-area-inset-top));
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        z-index: 1001;
        pointer-events: none;
      }

      .nav-btn {
        background: rgba(20, 20, 25, 0.75);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        border-radius: 20px;
        padding: 8px 16px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      .nav-btn:active { background: #10b981; transform: scale(0.95); }

      /* =========================================
         LOGBOOK MODAL (Sliding Panel)
         ========================================= */
      #logbook-panel {
        position: fixed;
        bottom: 0; left: 0; width: 100%; height: 80vh;
        background: rgba(20, 20, 25, 0.95);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.2);
        border-radius: 24px 24px 0 0;
        z-index: 9999;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex; flex-direction: column;
        padding: 20px; color: white;
      }
      #logbook-panel.open { transform: translateY(0); }
      
      .log-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 15px; }
      .log-header h2 { margin: 0; font-size: 20px; }
      .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
      
      #log-list { flex: 1; overflow-y: auto; padding-right: 10px; }
      .log-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
      .log-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;}
      .log-item h4 { margin: 0; font-size: 16px; color: #10b981; }
      .log-item span { font-size: 12px; color: #aaa; }
      .log-location { font-size: 12px; color: #ddd; display: block; margin-top: 5px; }
      .empty-log { text-align: center; color: #aaa; margin-top: 40px; font-size: 14px; }

      /* =========================================
         UI OVERLAY & ACTION BUTTON
         ========================================= */
      #ui-overlay {
        position: absolute; bottom: max(30px, env(safe-area-inset-bottom) + 15px); left: 50%; transform: translateX(-50%) translateY(20px); z-index: 999; width: 90%; max-width: 420px;
        background: rgba(20, 20, 25, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); border-radius: 24px; color: white; padding: clamp(15px, 5vw, 25px); text-align: center; pointer-events: auto; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0.9;
      }
      #ui-overlay.found-state { background: rgba(16, 185, 129, 0.9); border: 1px solid rgba(255, 255, 255, 0.5); transform: translateX(-50%) translateY(0) scale(1.03); opacity: 1; }
      #ui-overlay h3 { margin: 0 0 6px 0; font-size: clamp(18px, 5vw, 22px); font-weight: 600; }
      #ui-overlay p { margin: 0; font-size: clamp(13px, 3.5vw, 15px); color: rgba(255, 255, 255, 0.95); line-height: 1.5; }
      .icon { font-size: clamp(28px, 8vw, 32px); margin-bottom: 8px; display: block; pointer-events: none; }
      
      .action-btn {
        display: inline-block; margin-top: 15px; padding: 10px 20px;
        background: white; color: #10b981; font-weight: 600; font-family: 'Poppins', sans-serif;
        text-decoration: none; border-radius: 12px; font-size: 14px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s;
      }
      .action-btn:active { transform: scale(0.95); }

      /* =========================================
         ONBOARDING, WARNINGS & GUIDES
         ========================================= */
      #onboarding-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fafafa; background-image: linear-gradient(#d1d5db 1px, transparent 1px), linear-gradient(90deg, #d1d5db 1px, transparent 1px); background-size: 40px 40px; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; transition: opacity 0.5s ease, visibility 0.5s ease; }
      #onboarding-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .onboarding-card { background: white; border: 2px solid #111; padding: 30px; width: 90%; max-width: 400px; border-radius: 12px; box-shadow: 6px 6px 0px #111; }
      .onboarding-card h1 { margin: 0 0 12px 0; font-size: 24px; color: #111; }
      .onboarding-card p { margin: 0 0 20px 0; font-size: 14px; color: #444; }
      .start-btn { background: transparent; border: 2px solid #111; color: #111; padding: 12px 24px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; }
      .start-btn:active { background: #111; color: white; transform: translateY(2px); box-shadow: 2px 2px 0px #111; }

      #distance-warning { position: absolute; top: max(70px, env(safe-area-inset-top) + 50px); left: 50%; transform: translateX(-50%); background: rgba(245, 158, 11, 0.95); color: white; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 1000; opacity: 0; transition: 0.3s; }
      #distance-warning.visible { opacity: 1; }

      #scanning-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; z-index: 998; pointer-events: none; transition: opacity 0.4s ease; }
      .corner { position: absolute; width: 40px; height: 40px; border-color: rgba(255, 255, 255, 0.9); border-style: solid; animation: pulse 2s infinite; }
      .top-left { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 16px; } .top-right { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 16px; } .bottom-left { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 16px; } .bottom-right { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 16px; }
      @keyframes pulse { 0% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 0.4; } 100% { transform: scale(1); opacity: 0.9; } }

      /* =========================================
         AI ANALYZE FLOATING TRIGGER BUTTON
         ========================================= */
      #ai-scan-btn {
        position: absolute;
        bottom: 210px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1002;
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 28px;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 15px;
        border-radius: 30px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        cursor: pointer;
        transition: transform 0.2s, background-color 0.2s;
      }
      #ai-scan-btn:active {
        transform: translateX(-50%) scale(0.95);
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    
    <div id="top-nav">
      <button id="lang-toggle" class="nav-btn">🌐 EN</button>
      <button id="log-toggle" class="nav-btn">📖 Logbook</button>
    </div>

    <div id="logbook-panel">
      <div class="log-header">
        <h2>My Sign Discoveries</h2>
        <button class="close-btn" id="close-logs">&times;</button>
      </div>
      <div id="log-list">
        <div class="empty-log">No signs scanned yet. Start exploring!</div>
      </div>
    </div>

    <div id="onboarding-screen">
      <div class="onboarding-card">
        <h1>AR Sign Scanner</h1>
        <p>Discover safety rules in AR. We will log the signs you find so you can review them later.</p>
        <button class="start-btn" id="start-btn">Start Experience</button>
      </div>
    </div>

    <button id="ai-scan-btn">
      📸 Analyze Sign with AI
    </button>

    <div id="distance-warning">⚠️ Move closer to the sign</div>
    <div id="scanning-guide"><div class="corner top-left"></div><div class="corner top-right"></div><div class="corner bottom-left"></div><div class="corner bottom-right"></div></div>
    
    <div id="ui-overlay">
      <span class="icon">📷</span><h3>Scanner Ready</h3><p>Align a sign within the frame to scan.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
      cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"
    >
      <a-assets>
        <img id="tex-yosi" src="images/yosi.png">
        <img id="tex-parking" src="images/parking.png">
        <img id="tex-noturn" src="images/noturn.png">
        <img id="tex-twoway" src="images/twoway.png">
        <img id="tex-narrowroad" src="images/narrowroad.png">
        <img id="tex-slippery" src="images/slippery.png">
        <img id="tex-pedestrian" src="images/predestrian.png">
        <img id="tex-windingroad" src="images/windingroad.png">
        <img id="tex-slipperyroad" src="images/slipperyroad.png">
        <img id="tex-drowning" src="images/drowning.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
      // =========================================
      // DATA DICTIONARY (Translation & Actions)
      // =========================================
      let currentLang = 'en';
      
      const imageOverlays = ["#tex-yosi", "#tex-parking", "#tex-noturn", "#tex-twoway", "#tex-narrowroad", "#tex-slippery", "#tex-pedestrian", "#tex-windingroad", "#tex-slipperyroad", "#tex-drowning"];
      
      const signData = [
        { 
          id: "no-smoking", icon: "🚭",
          en: { title: "No Smoking", desc: "Smoking or using e-cigarettes is strictly prohibited." },
          tl: { title: "Bawal Manigarilyo", desc: "Mahigpit na ipinagbabawal ang paninigarilyo dito." },
          action: { label: "Report Violation", url: "tel:911" }
        },
        { 
          id: "parking", icon: "🅿️",
          en: { title: "Parking Area", desc: "Designated location where vehicles can be safely parked." },
          tl: { title: "Paradahan", desc: "Ligtas na lugar kung saan maaaring iparada ang sasakyan." },
          action: { label: "Find Parking Nearby", url: "https://www.google.com/maps/search/parking+near+me" }
        },
        { 
          id: "no-turn", icon: "🚫",
          en: { title: "No Turning", desc: "Vehicles are not permitted to make a turn here." },
          tl: { title: "Bawal Lumiko", desc: "Ipinagbabawal ang pagliko ng sasakyan sa kanto na ito." }
        },
        { 
          id: "two-way", icon: "↕️",
          en: { title: "Two-Way Traffic", desc: "Warning: Entering a road with opposing traffic." },
          tl: { title: "Salubungang Trapiko", desc: "Babala: Kalsada na may kasalubong na mga sasakyan." }
        },
        { 
          id: "narrow", icon: "⚠️",
          en: { title: "Narrow Road", desc: "The road ahead narrows. Proceed with caution." },
          tl: { title: "Makipot na Daan", desc: "Kumikipot ang kalsada sa unahan. Mag-ingat sa pagmamaneho." }
        },
        { 
          id: "slippery", icon: "🥾",
          en: { title: "Slippery Surface", desc: "Watch your step! The surface here can be slippery." },
          tl: { title: "Madulas na Sahig", desc: "Mag-ingat sa paglalakad, madulas ang lapag." }
        },
        { 
          id: "pedestrian", icon: "🚶",
          en: { title: "Pedestrian Crossing", desc: "Slow down and yield to pedestrians crossing." },
          tl: { title: "Tawiran ng Tao", desc: "Magbagal at magbigay-daan sa mga tumatawid." }
        },
        { 
          id: "winding", icon: "🔄",
          en: { title: "Winding Road", desc: "Series of curves ahead. Reduce speed and drive carefully." },
          tl: { title: "Paikot-ikot na Daan", desc: "Sunod-sunod na kurbada sa unahan. Bawasan ang bilis." }
        },
        { 
          id: "wet-road", icon: "🌧️",
          en: { title: "Slippery When Wet", desc: "Vehicles may lose traction here during rain." },
          tl: { title: "Madulas Kapag Basa", desc: "Maaaring mawalan ng kontrol ang sasakyan kapag umuulan." }
        },
        { 
          id: "deep-water", icon: "🛟",
          en: { title: "Deep Water Hazard", desc: "Warning: Deep water area. Swimming is dangerous." },
          tl: { title: "Malalim na Tubig", desc: "Babala: Malalim ang tubig dito. Delikadong lumangoy." },
          action: { label: "Emergency Rescue", url: "tel:911" }
        }
      ];

      // =========================================
      // TTS & AUDIO LOGIC
      // =========================================
      const synth = window.speechSynthesis;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playTone(f, t, d) {
        if(audioCtx.state === 'suspended') return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
      }
      
      function speakText(text) {
        synth.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = currentLang === 'en' ? 'en-US' : 'tl-PH';
        synth.speak(utterance);
      }

      // =========================================
      // LOGBOOK & GEOLOCATION LOGIC
      // =========================================
      const logListUI = document.getElementById('log-list');
      
      function getLogs() {
        return JSON.parse(localStorage.getItem('ar-scans')) || [];
      }

      function saveScanToLog(signIndex) {
        const logs = getLogs();
        const sign = signData[signIndex];
        
        const alreadyScannedToday = logs.some(l => l.id === sign.id && new Date(l.time).toDateString() === new Date().toDateString());
        if(alreadyScannedToday) return;

        const newEntry = {
          id: sign.id, icon: sign.icon,
          title: sign.en.title,
          time: new Date().toISOString(),
          location: "Searching location..."
        };
        
        logs.unshift(newEntry);
        localStorage.setItem('ar-scans', JSON.stringify(logs));
        renderLogs();

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude.toFixed(4);
            const lng = pos.coords.longitude.toFixed(4);
            
            const updatedLogs = getLogs();
            updatedLogs[0].location = `Lat: ${lat}, Lng: ${lng}`;
            localStorage.setItem('ar-scans', JSON.stringify(updatedLogs));
            renderLogs();
          });
        }
      }

      function renderLogs() {
        const logs = getLogs();
        if (logs.length === 0) return;
        
        logListUI.innerHTML = logs.map(log => {
          const dateStr = new Date(log.time).toLocaleDateString() + ' at ' + new Date(log.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          return `
            <div class="log-item">
              <div class="log-item-header">
                <h4>${log.icon} ${log.title}</h4>
                <span>${dateStr}</span>
              </div>
              <span class="log-location">📍 ${log.location}</span>
            </div>
          `;
        }).join('');
      }

      document.getElementById('log-toggle').addEventListener('click', () => {
        renderLogs();
        document.getElementById('logbook-panel').classList.add('open');
      });
      document.getElementById('close-logs').addEventListener('click', () => {
        document.getElementById('logbook-panel').classList.remove('open');
      });

      // =========================================
      // UI / AR LOGIC & HYBRID AI MODULE
      // =========================================
      const uiOverlay = document.querySelector('#ui-overlay');
      const scanGuide = document.querySelector('#scanning-guide');
      const aiScanBtn = document.getElementById('ai-scan-btn');
      let activeSignIndex = null;

      document.getElementById('lang-toggle').addEventListener('click', (e) => {
        currentLang = currentLang === 'en' ? 'tl' : 'en';
        e.target.innerText = currentLang === 'en' ? '🌐 EN' : '🌐 TL';
        
        if (activeSignIndex !== null) {
          updateUIOverlay(activeSignIndex);
        }
      });

      function updateUIOverlay(index) {
        const data = signData[index];
        const langData = data[currentLang];
        
        let html = `<span class="icon">${data.icon}</span><h3>${langData.title}</h3><p>${langData.desc}</p>`;
        
        if(data.action) {
          html += `<a href="${data.action.url}" class="action-btn" target="_blank">${data.action.label}</a>`;
        }
        
        uiOverlay.innerHTML = html;
        uiOverlay.classList.add("found-state");
      }

      document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('onboarding-screen').classList.add('hidden');
        if (audioCtx.state === 'suspended') audioCtx.resume();
        synth.speak(new SpeechSynthesisUtterance(''));
      });

      // Unified Cloud Vision Handler
      aiScanBtn.addEventListener('click', async () => {
        const videoElement = document.querySelector('body video');
        if (!videoElement) {
          alert("Camera track stream not loaded yet!");
          return;
        }

        aiScanBtn.innerText = "⚡ AI Thinking...";
        aiScanBtn.style.opacity = "0.6";
        uiOverlay.innerHTML = `<span class="icon">⏳</span><h3>AI Analyzing...</h3><p>Extracting image properties via serverless secure router context...</p>`;

        try {
          // Frame capture step from running video thread
          const canvas = document.createElement('canvas');
          canvas.width = videoElement.videoWidth || 640;
          canvas.height = videoElement.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
          
          const base64Data = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

          // Forward to local Vercel endpoint (keeping your key hidden)
          const response = await fetch('/api/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64Data })
          });

          if (!response.ok) throw new Error("Endpoint rejected context request thread data payload.");
          
          const aiResult = await response.json();

          // Display AI insights inside UI overlay container card without disrupting the active 3D world space coordinates
          uiOverlay.innerHTML = `<span class="icon">🤖</span><h3>${aiResult.title} (AI Verified)</h3><p>${aiResult.purpose}</p>`;
          uiOverlay.classList.add("found-state");
          
          speakText(`${aiResult.title}. ${aiResult.purpose}`);

        } catch (error) {
          console.error("Cloud interpretation process aborted:", error);
          uiOverlay.innerHTML = `<span class="icon">❌</span><h3>AI Analysis Failed</h3><p>Could not read sign parameters. Check your server metrics or connection.</p>`;
        } finally {
          aiScanBtn.innerText = "📸 Analyze Sign with AI";
          aiScanBtn.style.opacity = "1";
        }
      });

      // AR Target Generation System
      const container = document.querySelector('#target-container');
      for (let i = 0; i < signData.length; i++) {
        const targetEntity = document.createElement('a-entity');
        targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        const signContainer = document.createElement('a-entity');
        signContainer.setAttribute('class', 'clickable'); 
        signContainer.setAttribute('rotation', '90 0 0');
        signContainer.setAttribute('animation__rotate', 'property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 10000; easing: linear;');
        signContainer.setAttribute('animation__click', 'property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 200; startEvents: click; dir: alternate; loop: 1;');

        signContainer.addEventListener('click', () => { playTone(600, 'triangle', 0.1); if(navigator.vibrate) navigator.vibrate(50); });

        const rim = document.createElement('a-cylinder'); rim.setAttribute('radius','0.51'); rim.setAttribute('height','0.06'); rim.setAttribute('open-ended','true'); rim.setAttribute('side','double'); rim.setAttribute('color','#4a4a4a');
        const back = document.createElement('a-circle'); back.setAttribute('radius','0.5'); back.setAttribute('position','0 -0.029 0'); back.setAttribute('rotation','90 0 180'); back.setAttribute('material',`src:${imageOverlays[i]}`);
        const face = document.createElement('a-circle'); face.setAttribute('radius','0.5'); face.setAttribute('position','0 0.03 0'); face.setAttribute('rotation','-90 0 0'); face.setAttribute('material',`src:${imageOverlays[i]}`);

        signContainer.appendChild(rim); signContainer.appendChild(back); signContainer.appendChild(face);

        targetEntity.addEventListener("targetFound", () => {
          activeSignIndex = i;
          
          playTone(880, 'sine', 0.1); setTimeout(() => playTone(1100, 'sine', 0.2), 100);
          if(navigator.vibrate) navigator.vibrate([100,50,100]);
          
          updateUIOverlay(i);
          speakText(`${signData[i][currentLang].title}. ${signData[i][currentLang].desc}`);
          
          saveScanToLog(i); 
          
          scanGuide.style.opacity = "0";
        });

        targetEntity.addEventListener("targetLost", () => {
          activeSignIndex = null;
          synth.cancel();
          uiOverlay.innerHTML = `<span class="icon">📷</span><h3>Scanner Ready</h3><p>Align a sign within the frame to scan.</p>`;
          uiOverlay.classList.remove("found-state");
          scanGuide.style.opacity = "1";
        });

        targetEntity.appendChild(signContainer);
        container.appendChild(targetEntity);
      }
    </script>
  </body>
</html>
